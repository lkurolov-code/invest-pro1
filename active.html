<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktiv Sarmoyalar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body style="background: #f0f2f5; font-family: sans-serif;">

   <!-- 1. Ism so'rash bo'limi -->
   <div id="auth-section" style="max-width: 400px; margin: 100px auto; text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <i class="fas fa-user-shield" style="font-size: 50px; color: #2ecc71; margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 20px; color: #2c3e50;">Profilni faollashtirish</h2>
        <input type="text" id="user-fullname" placeholder="Ism va familiyangiz" style="padding: 12px; width: 80%; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px;">
        <button onclick="ishniBoshlash()" style="width: 85%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px;">
            Profilni ochish
        </button>
    </div>

    <!-- 2. Chiroyli Profil bo'limi (Faqat bitta bo'lishi kerak) -->
    <div id="profile-section" style="display: none; max-width: 450px; margin: 30px auto; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
    
    <div style="text-align: center; border-bottom: 2px solid #f8f9fa; padding-bottom: 15px; margin-bottom: 15px;">
        <h2 id="p-name" style="margin: 0; color: #2c3e50;">-</h2>
        <span style="color: #2ecc71; font-weight: bold;">Faol sarmoyador ✅</span>
    </div>

    <!-- ASOSIY HISOB-KITOBLAR -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;">
        <div style="background: #f8f9fa; padding: 12px; border-radius: 12px;">
            <p style="margin: 0; font-size: 12px; color: #7f8c8d;">Kiritilgan sarmoya:</p>
            <strong id="p-price" style="color: #2c3e50; font-size: 16px;">-</strong>
        </div>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 12px;">
            <p style="margin: 0; font-size: 12px; color: #7f8c8d;">Kunlik daromad:</p>
            <strong style="color: #2ecc71; font-size: 16px;">+3%</strong>
        </div>
        <div style="background: #fff3e0; padding: 12px; border-radius: 12px; grid-column: span 2;">
            <p style="margin: 0; font-size: 12px; color: #e67e22;">Jami kutilayotgan foyda (60 kun):</p>
            <strong id="p-total-profit" style="color: #e67e22; font-size: 18px;">-</strong>
        </div>
    </div>

    <!-- MUDDATLAR HAQIDA MA'LUMOT -->
    <div style="margin-top: 20px; text-align: left; font-size: 14px; background: #e8f8f1; padding: 15px; border-radius: 12px;">
        <p style="margin: 5px 0;">📅 <b>Boshlanish:</b> <span id="p-start-date">-</span></p>
        <p style="margin: 5px 0;">🚀 <b>Yakunlanish:</b> <span id="p-end-date">-</span></p>
        <p style="margin: 5px 0; color: #27ae60;">💰 <b>Qaytariladigan summa:</b> <span id="p-return-sum">-</span></p>
    </div>

    <!-- TELEGRAM TUGMASI -->
    <button onclick="savdoQilish()" style="width: 100%; margin-top: 20px; background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold;">
        Savdoni tasdiqlash (Telegram)
    </button>
    <button onclick="logout()" style="width: 100%; margin-top: 10px; background: #fdf2f2; color: #e74c3c; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s;">
    <i class="fas fa-sign-out-alt"></i> Profilni yopish (Chiqish)
</button>
</div>


    <!-- 3. JS KOD (Script.js fayliga qo'shsangiz ham bo'ladi) -->
    <script src="script.js"></script>
</body>
</html>
