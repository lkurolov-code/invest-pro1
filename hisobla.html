<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Daromad Hisoblagich</title>
    <!-- FontAwesome va Chart.js to'g'ri havolalari -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kalkulyator uchun maxsus qo'shimcha uslublar */
        .calc-wrapper {
            max-width: 900px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 20px;
        }
        .input-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .result-card {
            background: #1e293b;
            color: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }
        @media (max-width: 768px) { .calc-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body style="background: #f1f5f9;">

<nav style="background: white; padding: 15px 10%; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <div class="logo" style="color: #2563eb; font-weight: bold; font-size: 24px;">InvestPro</div>
    <a href="index.html" style="text-decoration: none; color: #666;"><i class="fas fa-arrow-left"></i> Orqaga qaytish</a>
</nav>

<div class="calc-wrapper">
    <!-- INPUTLAR -->
    <div class="input-card">
        <h3 style="margin-top: 0;"><i class="fas fa-calculator"></i> Hisoblagich</h3>
        
        <label>Sarmoya miqdori (UZS):</label>
        <input type="number" id="summa" value="500000" oninput="hisobla()">

        <label>Muddat (Kun):</label>
        <select id="kun" onchange="hisobla()">
            <option value="60">60 kun (START)</option>
            <option value="150" selected>150 kun (OPTIMAL)</option>
            <option value="365">365 kun (MAXIMUM)</option>
        </select>

        <p style="font-size: 14px; color: #10b981;"><i class="fas fa-percent"></i> Kunlik daromad stavkasi: 3%</p>
        
        <div style="margin-top: 20px;">
            <canvas id="miniChart" height="200"></canvas>
        </div>
    </div>

    <!-- NATIJALAR -->
    <div class="result-card">
        <h3>Natijangiz:</h3>
        <div class="stat-row">
            <span>Kunlik foyda:</span>
            <b id="kunlikFoyda" style="color: #fbbf24;">0 UZS</b>
        </div>
        <div class="stat-row">
            <span>Umumiy foyda:</span>
            <b id="umumiyFoyda">0 UZS</b>
        </div>
        <div style="margin-top: 20px; background: #2563eb; padding: 15px; border-radius: 10px; text-align: center;">
            <span style="font-size: 14px; opacity: 0.9;">Jami qaytariladigan summa:</span>
            <h2 id="jamiSumma" style="margin: 5px 0;">0 UZS</h2>
        </div>
        <a href="https://t.me/Nazokat8910" style="display: block; text-align: center; background: #fbbf24; color: #000; padding: 12px; margin-top: 20px; border-radius: 8px; text-decoration: none; font-weight: bold;">
            Sarmoyani boshlash <i class="fab fa-telegram-plane"></i>
        </a>
    </div>
</div>

<script>
let myChart;

function hisobla() {
    const summa = parseFloat(document.getElementById('summa').value) || 0;
    const kunlar = parseInt(document.getElementById('kun').value);
    const foiz = 0.03; // Kuniga 3%

    const kunlik = summa * foiz;
    const sofFoyda = kunlik * kunlar;
    const jami = summa + sofFoyda;

    // Natijalarni ekranga chiqarish
    document.getElementById('kunlikFoyda').innerText = kunlik.toLocaleString() + " UZS";
    document.getElementById('umumiyFoyda').innerText = sofFoyda.toLocaleString() + " UZS";
    document.getElementById('jamiSumma').innerText = jami.toLocaleString() + " UZS";

    // Grafikni yangilash
    chizish(summa, jami, kunlar);
}

function chizish(boshlangich, oxirgi, muddat) {
    const ctx = document.getElementById('miniChart').getContext('2d');
    
    if (myChart) { myChart.destroy(); }

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Boshida', 'Yarim muddat', 'Yakunda'],
            datasets: [{
                label: 'Mablag\' o\'sishi',
                data: [boshlangich, (boshlangich + oxirgi)/2, oxirgi],
                borderColor: '#2563eb',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(37, 99, 235, 0.1)'
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { display: false } }
        }
    });
}

// Sahifa yuklanganda ishga tushirish
window.onload = hisobla;
</script>

</body>
</html>
