<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro - Hisobla</title>
    
    <!-- Ikonkalar (FontAwesome) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- CSS faylimizga ulanish -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">InvestPro</div>
        <a href="https://t.me" class="nav-join-btn">Bog'lanish</a>
    </nav>

    <section class="calc-section">
        <div class="container">
            <div class="calc-info">
                <span class="badge">KALKULYATOR</span>
                <h2>Daromadingizni hisoblang</h2>
            </div>

            <div class="calc-container">
                <!-- Kirish ma'lumotlari -->
                <div class="calc-inputs">
                    <div class="input-card">
                        <label><i class="fas fa-wallet"></i> Sarmoya miqdori (UZS)</label>
                        <input type="number" id="investAmount" value="1000000" oninput="calculateProfit()">
                    </div>

                    <div class="input-card">
                        <label><i class="fas fa-layer-group"></i> Tarifni tanlang</label>
                        <select id="planSelect" onchange="calculateProfit()">
                            <option value="0.01" data-days="60">START (1% / 60 kun)</option>
                            <option value="0.03" data-days="150" selected>OPTIMAL (3% / 150 kun)</option>
                            <option value="0.10" data-days="365">MAXIMUM (10% / 365 kun)</option>
                        </select>
                    </div>

                    <div class="results-grid">
                        <div class="res-box">
                            <span>Kunlik foyda</span>
                            <h4 id="dailyProfit">0 UZS</h4>
                        </div>
                        <div class="res-box">
                            <span>Sof foyda</span>
                            <h4 id="totalProfit">0 UZS</h4>
                        </div>
                    </div>
                    
                    <div class="final-card">
                        <div class="final-text">
                            <span>Jami qaytadigan summa:</span>
                            <h3 id="finalAmount">0 UZS</h3>
                        </div>
                    </div>
                </div>

                <!-- Grafik -->
                <div class="calc-visual">
                    <div class="chart-box">
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Chart.js kutubxonasi (internetdan yuklanadi) -->
    <script src="https://jsdelivr.net"></script>
    <!-- O'zimizning JS faylimizga ulanish -->
    <script src="script.js"></script>
</body>
</html>
