<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Daromad Hisoblagich</title>
    <!-- To'g'ri ikonka linki -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f1f5f9;">
    <nav style="background: white; padding: 15px 10%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
        <div class="logo" style="color: #2563eb; font-weight: bold; font-size: 24px;">InvestPro</div>
        <a href="index.html" style="text-decoration: none; color: #666;"><i class="fas fa-arrow-left"></i> Orqaga</a>
    </nav>

    <div class="calc-wrapper">
        <div class="input-card">
            <h3><i class="fas fa-calculator"></i> Hisoblagich</h3>
            
            <label>Tarifni tanlang (Sarmoya):</label>
            <select id="summa" onchange="hisobla()" style="width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="200000">Kitob 1 - 200 000 UZS</option>
                <option value="500000">Kitob 2 - 500 000 UZS</option>
                <option value="1000000">Kitob 3 - 1 000 000 UZS</option>
            </select>

            <label>Muddat (Kun):</label>
            <select id="kun" onchange="hisobla()" style="width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="60">60 kun (START)</option>
                <option value="150" selected>150 kun (OPTIMAL)</option>
                <option value="365">365 kun (MAXIMUM)</option>
            </select>
            
            <p style="font-size: 13px; color: #666; font-style: italic;">* Eslatma: Sarmoya summasi qaytarilmaydi, foyda ichiga kiritilgan.</p>
        </div>

        <div class="result-card">
            <h3 style="margin-bottom: 20px;">Natijangiz:</h3>
            <div class="stat-row"><span>Kunlik foyda (2%):</span> <b id="kunlikFoyda" style="color: #fbbf24;">0 UZS</b></div>
            <div class="stat-row"><span>Jami sof foyda:</span> <b id="umumiyFoyda">0 UZS</b></div>
            
            <div style="background: #2563eb; padding: 20px; border-radius: 12px; text-align: center; margin-top: 10px;">
                <span style="font-size: 13px; opacity: 0.9;">Muddat yakunidagi jami daromad:</span>
                <h2 id="jamiSumma" style="margin-top: 5px; font-size: 28px;">0 UZS</h2>
            </div>

            <button onclick="sarmoyaniBoshlash()" style="width:100%; margin-top:20px; cursor:pointer; background:#fbbf24; border:none; padding:18px; border-radius:10px; font-weight:bold; font-size:16px; transition: 0.3s;">
                Sarmoyani boshlash <i class="fab fa-telegram-plane"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
